name: pipenv
description: 'Install python packages with pipenv'
inputs:
  python-version:
    description: The python version
    required: false
    default: "3.11"
outputs:
  pipenv-root:
    description: >-
      Root directory where the virtual environment has been created (where the
      Pipfile sits)
    value: ${{ steps.pipenv.outputs.pipenv-root }}

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        working-directory: ${{ github.action_path }}
        activate-environment: true

    - name: Prepare pipenv virtualenv
      id: pipenv
      shell: bash
      run: |
        uv run --frozen --project ${{ github.action_path }} pipenv install --deploy --dev --python ${{ inputs.python-version }}
        echo "pipenv-root=$(pwd)" >> $GITHUB_OUTPUT
