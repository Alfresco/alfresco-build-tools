name: "Pre-commit run"
description: "Install and run pre-commit"
inputs:
  pre-commit-args:
    description: Additional parameters to pass to pre-commit
    required: false
  pre-commit-all-files:
    description: >-
      Whether to run pre-commit checks on all files (defaults to "true")
    required: false
    default: "true"
  auto-commit:
    description: >-
      Enables auto-commit of eventual fixups
      (requires `permissions.contents: write` on the calling job)
    required: false
    default: "false"
  python-version:
    description: The python version of the local runner
    required: false
    default: "3.11"
  skip_checkout:
    description: If the internal checkout action should be skipped or not
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      if: inputs.skip_checkout == 'false'
      env:
        REF_TO_CHECKOUT: ${{ inputs.auto-commit == 'true' && github.head_ref || '' }}
      with:
        ref: ${{ env.REF_TO_CHECKOUT }}

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version-file: ${{ github.action_path }}/pyproject.toml

    - name: Build extra_args
      shell: bash
      id: build-extra-args
      run: |
        ${{ inputs.pre-commit-all-files }} && EXTRA_ARGS='--all-files'
        EXTRA_ARGS="${EXTRA_ARGS} ${{ inputs.pre-commit-args }}"
        echo "RUN_EXTRA_ARGS=${EXTRA_ARGS}" >> $GITHUB_OUTPUT

    - name: Cache pre-commit
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Run pre-commit
      id: pre-commit
      continue-on-error: ${{ fromJSON(inputs.auto-commit == 'true') }}
      run: |
        uv run --frozen pre-commit run --show-diff-on-failure --color=always ${{ steps.build-extra-args.outputs.RUN_EXTRA_ARGS }}
      shell: bash

    - name: Auto-commit changes if requested
      uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
      id: auto-commit-action
      if: inputs.auto-commit == 'true'

    - name: Run pre-commit again to verify changes
      run: uv run --frozen pre-commit run --show-diff-on-failure --color=always ${{ steps.build-extra-args.outputs.RUN_EXTRA_ARGS }}
      if: inputs.auto-commit == 'true' && steps.pre-commit.outcome == 'failure'
      shell: bash
