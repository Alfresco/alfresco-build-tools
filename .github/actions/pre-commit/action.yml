name: "Pre-commit run"
description: "Run pre-commit using a self-managed uv environment"
inputs:
  pre-commit-args:
    description: Additional parameters to pass to pre-commit (--all-files is always included)
    required: false
  auto-commit:
    description: >-
      Enables auto-commit of eventual fixups
      (requires `permissions.contents: write` on the calling job)
    required: false
    default: "false"
  auto-commit-files:
    description: >-
      Files to include in the auto-commit (if enabled, defaults to all files)
      (ignored if auto-commit is disabled)
    required: false
    default: "**"
  python-version:
    description: Python version used to run pre-commit
    required: false
    default: "3.11"
  skip_checkout:
    description: If the internal checkout action should be skipped or not
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Determine checkout ref
      id: checkout-ref
      shell: bash
      env:
        AUTO_COMMIT: ${{ inputs.auto-commit }}
        HEAD_REF: ${{ github.event.pull_request.head.ref }}
        DEFAULT_REF: ${{ github.ref }}
      run: |
        # When auto-commit is enabled on a pull_request, checkout the PR head
        # branch instead of the default merge ref: otherwise pre-commit would
        # run against the synthetic merge commit and push unrelated base-branch
        # changes back to the PR branch. Fall back to github.ref (never empty)
        # for non-PR events or when auto-commit is disabled.
        if [ "$AUTO_COMMIT" = "true" ] && [ -n "$HEAD_REF" ]; then
          echo "ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
        else
          echo "ref=$DEFAULT_REF" >> "$GITHUB_OUTPUT"
        fi

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      if: inputs.skip_checkout == 'false'
      with:
        ref: ${{ steps.checkout-ref.outputs.ref }}

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        working-directory: ${{ github.action_path }}

    - name: Build pre-commit extra arguments
      shell: bash
      id: build-extra-args
      env:
        PRE_COMMIT_ARGS: ${{ inputs.pre-commit-args }}
      run: |
        EXTRA_ARGS="--all-files ${PRE_COMMIT_ARGS}"
        echo "args=${EXTRA_ARGS}" >> $GITHUB_OUTPUT

    - name: Cache pre-commit
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-4|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Run pre-commit
      id: pre-commit
      continue-on-error: ${{ inputs.auto-commit == 'true' }}
      run: |
        uv run --frozen --project ${{ github.action_path }} pre-commit run --show-diff-on-failure --color=always ${{ steps.build-extra-args.outputs.args }}
      shell: bash

    - name: Commit changes
      id: auto-commit-action
      if: inputs.auto-commit == 'true' && steps.pre-commit.outcome == 'failure'
      uses: iarekylew00t/verified-bot-commit@33985d44b7719dcaf0b854a0f4b0caad9bdc5b86 # v2.3.3
      with:
        ref: ${{ steps.checkout-ref.outputs.ref }}
        message: '[pre-commit] Auto-commit fixups'
        files: |
          ${{ inputs.auto-commit-files }}
        if-no-commit: info

    - name: Run pre-commit again to verify changes
      run: uv run --frozen --project ${{ github.action_path }} pre-commit run --show-diff-on-failure --color=always ${{ steps.build-extra-args.outputs.args }}
      if: inputs.auto-commit == 'true' && steps.pre-commit.outcome == 'failure'
      shell: bash
