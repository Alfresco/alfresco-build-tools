name: GitHub Upsert Comment
description: >
  Create or update a comment on a GitHub issue or pull request. Supports idempotent
  updates using an optional identifier to update the same comment on re-runs instead
  of creating duplicates.

inputs:
  comment-body:
    description: Markdown body for the comment.
    required: true
  comment-identifier:
    description: >
      Optional unique identifier for the comment. If provided, the action will
      search for an existing comment containing this identifier and update it
      instead of creating new comments. The identifier will be added as an HTML
      comment at the top of the body.
      Recommended format: workflow-name or action-purpose (e.g., "dependency-check").
    required: false
  issue-number:
    description: The number of the issue or pull request. Defaults to the current PR number.
    required: false
    default: ${{ github.event.pull_request.number }}
  github-token:
    description: GitHub token with permissions to write comments (pull-requests:write or issues:write).
    required: false
    default: ${{ github.token }}

outputs:
  comment-id:
    description: The ID of the created or updated comment
    value: ${{ steps.create-or-update.outputs.comment-id }}

runs:
  using: composite
  steps:
    - name: Find existing comment
      if: inputs.comment-identifier != ''
      uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
      id: find-comment
      with:
        issue-number: ${{ inputs.issue-number }}
        comment-author: 'github-actions[bot]'
        body-includes: <!-- comment-id=${{ inputs.comment-identifier }} -->
        token: ${{ inputs.github-token }}

    - name: Create or update comment
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      id: create-or-update
      with:
        issue-number: ${{ inputs.issue-number }}
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        edit-mode: replace
        token: ${{ inputs.github-token }}
        body: |
          ${{ inputs.comment-identifier != '' && format('<!-- comment-id={0} -->', inputs.comment-identifier) || '' }}
          ${{ inputs.comment-body }}
