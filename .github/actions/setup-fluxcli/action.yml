name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.8
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@eae6eca716938b1a6deefc7789a9c510cf53bd5d
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
