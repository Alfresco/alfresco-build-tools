name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.8
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@9d4b4ff5eac104e61cf1aa7c98ca9c63e7b63193
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
