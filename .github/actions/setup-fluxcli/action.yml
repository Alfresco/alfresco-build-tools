name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.7
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@1a5d970e507e5416f902df48b34452649eb14f10
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
