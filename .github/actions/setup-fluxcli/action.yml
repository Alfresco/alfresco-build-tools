name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.7
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@b77543938133f2b956c35a093c6aaa0b3418cdc9
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
