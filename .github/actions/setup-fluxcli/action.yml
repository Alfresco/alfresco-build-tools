name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.9.2
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@e1c0f83d74dcd5aef19f30519566f2ab81a6b12e
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
