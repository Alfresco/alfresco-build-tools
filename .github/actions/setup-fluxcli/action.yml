name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.8
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@fa41b8a106f55c55876f13db47f608ed8fa32cbe
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
