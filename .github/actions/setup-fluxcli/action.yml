name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.6
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@9f51752cb7845dce8e8b13b866c127681f418bb3
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
