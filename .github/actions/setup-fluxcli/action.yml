name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.8
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@1d4d24431cc8b3b9399eb100679e42a6fbb03ae4
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
