name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.9.1
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@9c89afc1dfc45dd30bab01950098c76c03eeb44c
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
