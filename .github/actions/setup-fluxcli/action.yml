name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.6
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@c7892aaf95a1f5e5b82ab26b502e17ff3d2f309b
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
