name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.8
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@a4d5e8a1b4db955628c23fe5981c88064d8c358d
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
