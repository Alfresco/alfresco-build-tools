name: 'Setup Flux CLI'
description: 'Set up a specific version of Flux CLI and add it to the PATH.'
inputs:
  version:
    description: 'Version of Flux CLI'
    required: false
    default: 2.8.7
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@f5a731fc750cbec49d51a98a79f91d28618667b8
      with:
        binary_name: flux
        repo: fluxcd/flux2
        version: ${{ inputs.version }}
