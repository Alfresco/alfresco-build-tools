name: "Setup Kubepug"
description: "Install the Kubernetes preupgrade checker"
inputs:
  version:
    description: The kubepug version to install
    default: "1.7.1"
    required: false
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@e98709bf3f97a1a06c14d2d09c0a160f52262c3b
      with:
        repo: kubepug/kubepug
        version: ${{ inputs.version }}
        url_template: 'v${VERSION}/${NAME}_${OS}_${ARCH}.tar.gz'
        test_args: 'version'
