name: "Setup Kubepug"
description: "Install the Kubernetes preupgrade checker"
inputs:
  version:
    description: The kubepug version to install
    default: "1.7.1"
    required: false
runs:
  using: "composite"
  steps:
    - uses: Alfresco/alfresco-build-tools/.github/actions/setup-github-release-binary@c7892aaf95a1f5e5b82ab26b502e17ff3d2f309b
      with:
        repo: kubepug/kubepug
        version: ${{ inputs.version }}
        url_template: 'v${VERSION}/${NAME}_${OS}_${ARCH}.tar.gz'
        test_args: 'version'
