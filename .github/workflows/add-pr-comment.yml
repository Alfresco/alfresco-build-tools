name: Add PR Comment

on:
  workflow_call:
    inputs:
      comment-body:
        description: Markdown body for the PR comment.
        required: true
        type: string
      comment-identifier:
        description: >
          Optional unique identifier for the comment. If provided, the action
          will search for an existing comment containing this identifier and
          update it instead of creating new comments. The identifier will be
          added as an HTML comment at the top of the body.
          Recommended format: workflow-name or action-purpose (e.g., "dependency-check").
        required: false
        type: string

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        if: inputs.comment-identifier != ''
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: <!-- comment-id=${{ inputs.comment-identifier }} -->

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ${{ inputs.comment-identifier != '' && format('<!-- comment-id={0} -->', inputs.comment-identifier) || '' }}
            ${{ inputs.comment-body }}
