name: "Terraform"

on:
  workflow_call:
    inputs:
      terraform_root_path:
        description: the path to the root module to apply, auto-detected if not provided
        type: string
        required: false
      terraform_operation:
        description: |
          the terraform operation to perform (plan, apply or destroy).
          If not set, the operation will be determined based on the GitHub event.
          For pull requests, it will run plan and for pushes it will run apply based on the PR plan.
          For pull requests comments, it will run apply if the comment contains 'terraform apply'.
        type: string
        required: false
      terraform_env:
        description: the terraform environment to use (e.g. dev, staging, prod), auto-detected if not provided
        type: string
        required: false
      terraform_default_env:
        description: the default terraform environment to use when auto-detection does not find a specific env (defaults to <terraform_root_path>-dev)
        type: string
        required: false
      create_oidc_token_file:
        description: whether to create a file with an OIDC token for AWS
        type: boolean
        required: false
        default: false
      install_kubectl:
        description: whether to install the kubectl CLI
        type: boolean
        required: false
        default: false
      kubectl_version:
        description: the version of kubectl to install (if install_kubectl is true). If not set, the latest stable version will be installed.
        type: string
        required: false
      tfvars_subfolder:
        description: the subfolder where tfvars files are located (relative to terraform_root_path)
        type: string
        required: false
        default: ''
      github_app_repo_owner:
        description: the owner (organization) of the GitHub App used to generate a token for accessing the private 'terraform-alfresco-modules' repository. Requires github_app_token_client_id and GITHUB_TOKEN_PRIVATE_KEY to be set.
        type: string
        required: false
      github_app_token_client_id:
        description: the client ID of the GitHub App used to generate a token for accessing the private 'terraform-alfresco-modules' repository. Requires github_app_repo_owner and GITHUB_TOKEN_PRIVATE_KEY to be set.
        type: string
        required: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      BOT_GITHUB_TOKEN:
        description: a GitHub token used to fetch terraform modules from private GitHub repositories.
        required: false
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      RANCHER2_ACCESS_KEY:
        required: false
      RANCHER2_SECRET_KEY:
        required: false
      AZURE_CREDENTIALS:
        required: false
      CUSTOM_SECRET_0:
        required: false
      CUSTOM_SECRET_1:
        required: false
      CUSTOM_SECRET_2:
        required: false
      CUSTOM_SECRET_3:
        required: false
      CUSTOM_SECRET_4:
        required: false
      CUSTOM_SECRET_5:
        required: false
      CUSTOM_SECRET_6:
        required: false
      CUSTOM_SECRET_7:
        required: false
      CUSTOM_SECRET_8:
        required: false
      CUSTOM_SECRET_9:
        required: false
      GITHUB_TOKEN_PRIVATE_KEY:
        required: false

jobs:
  compute_basic_vars:
    name: compute basic variables
    runs-on: ubuntu-slim
    steps:
      - name: Validate inputs
        env:
          TERRAFORM_OPERATION: ${{ inputs.terraform_operation }}
          TFVARS_SUBFOLDER: ${{ inputs.tfvars_subfolder }}
        run: |
          if [ -z "${TERRAFORM_OPERATION}" ]; then
            echo "terraform_operation is not set, defaulting to github event based handling."
          else
            case "${TERRAFORM_OPERATION}" in
              apply|destroy|plan)
                ;;
              *)
                echo "Invalid terraform_operation: ${TERRAFORM_OPERATION}. Must be 'apply', 'destroy', or 'plan'."
                exit 1
                ;;
            esac
          fi

          if [ -z "${TFVARS_SUBFOLDER}" ]; then
            echo "::warning::tfvars_subfolder input is not set. Consider organizing your tfvars files in a 'vars' subfolder for better structure. Set tfvars_subfolder: 'vars' in your workflow to use this recommended layout."
          fi

      - name: Evaluate current branch
        id: get-branch-name
        uses: Alfresco/alfresco-build-tools/.github/actions/get-branch-name-v2@ea5ef8e5f1835df3f3cafebceed94f66dbdb86ee
        with:
          additional-pr-events: true

      - name: Set outputs
        if: inputs.terraform_root_path == '' || inputs.terraform_env == ''
        id: set-outputs
        env:
          PUSH_ON_DEFAULT_BRANCH: ${{ github.event_name == 'push' && github.event.repository.default_branch == steps.get-branch-name.outputs.branch-name }}
          PR_AGAINST_DEFAULT_BRANCH: ${{ github.event.repository.default_branch == steps.get-branch-name.outputs.base-branch-name }}
        run: |
          echo "Workflow is related to a promotion PR if:"
          echo "- it's not a push on the default branch (PUSH_ON_DEFAULT_BRANCH=false)"
          echo "AND"
          echo "- it's not a PR targeting the default branch (PR_AGAINST_DEFAULT_BRANCH=false)"
          echo "is_promotion_pr_related=${{ env.PUSH_ON_DEFAULT_BRANCH != 'true' && env.PR_AGAINST_DEFAULT_BRANCH != 'true' }}" >> "$GITHUB_OUTPUT"

      - name: Checkout code (used for auto-detection of terraform root path and/or environment)
        if: inputs.terraform_root_path == '' || inputs.terraform_env == ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || '' }}
          fetch-depth: 0

      - name: Retrieve PR or last commit changes (used for auto-detection of terraform root path and/or environment)
        if: inputs.terraform_root_path == '' || inputs.terraform_env == ''
        id: last-changes-diff
        uses: Alfresco/alfresco-build-tools/.github/actions/github-list-changes@ea5ef8e5f1835df3f3cafebceed94f66dbdb86ee
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-detect terraform root path based on changed files
        if: inputs.terraform_root_path == ''
        id: detect-path
        run: |
          if [ "${{ steps.set-outputs.outputs.is_promotion_pr_related }}" == "true" ]; then
            PROMOTION_PR_FILTER=$(echo "${{ steps.get-branch-name.outputs.base-branch-name || steps.get-branch-name.outputs.branch-name }}" | cut -d'-' -f1)
            echo "This is a promotion PR so restricting changed files to folders matching ${PROMOTION_PR_FILTER}"
          fi

          first_changed_folder=$(echo "${{ steps.last-changes-diff.outputs.all_changed_files }}" \
            | grep '/' \
            | cut -d/ -f1 \
            | grep -Ev '^(\..*|test)$' \
            | grep "${PROMOTION_PR_FILTER:-}" \
            | sort -u \
            | head -1 || true)

          echo "First changed folder: ${first_changed_folder:-none}"
          echo "terraform_root_path=$first_changed_folder" >> "$GITHUB_OUTPUT"

      - name: Auto-detect terraform environment based on changed files (when running against default branch)
        if: >-
          inputs.terraform_env == '' &&
          steps.set-outputs.outputs.is_promotion_pr_related == 'false'
        env:
          TERRAFORM_ROOT_PATH: ${{ steps.detect-path.outputs.terraform_root_path || inputs.terraform_root_path }}
        id: detect-tfvars
        run: |
          if [ -z "${TERRAFORM_ROOT_PATH}" ]; then
            echo "Cannot auto-detect a terraform environment without a terraform root path. Skipping environment auto-detection."
            echo "terraform_tfvars_file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          first_changed_tfvars=$(echo "${{ steps.last-changes-diff.outputs.all_changed_files }}" \
            | grep -v 'common.tfvars' \
            | grep -E '^${{ env.TERRAFORM_ROOT_PATH }}/.*\.tfvars$' \
            | sort -u \
            | head -1 \
            | xargs -r basename -s .tfvars)

          if [ -z "$first_changed_tfvars" ]; then
            DEFAULT_ENV="${{ inputs.terraform_default_env || format('{0}-dev', env.TERRAFORM_ROOT_PATH) }}"
            echo "No specific tfvars file changed, defaulting to '$DEFAULT_ENV'"
            first_changed_tfvars="$DEFAULT_ENV"
          else
            echo "Automatically selected environment based on tfvars file: $first_changed_tfvars"
          fi

          echo "terraform_tfvars_file=$first_changed_tfvars" >> "$GITHUB_OUTPUT"


      - name: Evaluate environment to target
        id: basic_vars
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.terraform_env }}" ]; then
            echo "Using environment from input: ${{ inputs.terraform_env }}"
            echo "environment_name=${{ inputs.terraform_env }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${{ steps.detect-tfvars.outputs.terraform_tfvars_file }}" ]; then
            echo "Using environment from changed tfvars file: ${{ steps.detect-tfvars.outputs.terraform_tfvars_file }}"
            echo "environment_name=${{ steps.detect-tfvars.outputs.terraform_tfvars_file }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Falling back to PR base branch or push branch name for environment name"
          BRANCH_NAME="${{ steps.get-branch-name.outputs.base-branch-name || steps.get-branch-name.outputs.branch-name }}"
          BRANCH_LOWER=${BRANCH_NAME,,}
          if [ "$BRANCH_LOWER" == "main" ]; then
            environment="production"
          elif [[ "$BRANCH_LOWER" =~ ^[a-z][a-z0-9-]{3,}$ ]]; then
            environment="${BRANCH_LOWER}"
          else
            echo "$BRANCH_LOWER is not a valid environment name."
            echo "It must:"
            echo " - start with a letter"
            echo " - contain only lowercase chars, numbers, and hyphens"
            echo " - be at least 4 characters long"
            exit 1
          fi

          echo "Using environment based on branch name: $environment"
          echo "environment_name=${environment}" >> "$GITHUB_OUTPUT"

      - name: Evaluate terraform operation
        id: operation
        env:
          IS_PULL_REQUEST_EVENT: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_review' }}
          IS_PUSH_EVENT: ${{ github.event_name == 'push' }}
          IS_ISSUE_COMMENT_EVENT: ${{ github.event_name == 'issue_comment' }}
          COMMENT_REQUESTS_PLAN: ${{ contains(github.event.comment.body, 'terraform plan') }}
          COMMENT_REQUESTS_APPLY: ${{ contains(github.event.comment.body, 'terraform apply') }}
          TERRAFORM_OPERATION_FROM_INPUTS: ${{ inputs.terraform_operation }}
        run: |
          # Resolve a single operation with precedence: plan > apply > destroy
          if [[ "$IS_PULL_REQUEST_EVENT" == "true" ]] || [[ "$TERRAFORM_OPERATION_FROM_INPUTS" == "plan" ]] || { [[ "$IS_ISSUE_COMMENT_EVENT" == "true" ]] && [[ "$COMMENT_REQUESTS_PLAN" == "true" ]]; }; then
            operation="plan"
          elif [[ "$IS_PUSH_EVENT" == "true" ]] || [[ "$TERRAFORM_OPERATION_FROM_INPUTS" == "apply" ]] || { [[ "$IS_ISSUE_COMMENT_EVENT" == "true" ]] && [[ "$COMMENT_REQUESTS_APPLY" == "true" ]]; }; then
            operation="apply"
          elif [[ "$TERRAFORM_OPERATION_FROM_INPUTS" == "destroy" ]]; then
            operation="destroy"
          elif [[ "$IS_ISSUE_COMMENT_EVENT" == "true" ]]; then
            echo "Issue comment does not request a terraform operation. Skipping."
            echo "terraform_operation=" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "Unable to determine terraform operation from the current event and inputs. BUG?" >&2
            exit 1
          fi

          echo "Determined terraform operation: $operation"
          echo "terraform_operation=${operation}" >> "$GITHUB_OUTPUT"

      - name: Add workflow summary info
        env:
          TERRAFORM_ROOT_PATH: ${{ (steps.detect-path.outputs.terraform_root_path || inputs.terraform_root_path) }}
          TERRAFORM_OPERATION: ${{ steps.operation.outputs.terraform_operation }}
          TERRAFORM_ENV: ${{ steps.basic_vars.outputs.environment_name }}
        run: |
          if [ -z "$TERRAFORM_ROOT_PATH" ]; then
            echo "### Not running Terraform 🚀" >> "$GITHUB_STEP_SUMMARY"
            echo "Could not determine the root path for Terraform. Assuming there are no Terraform changes to apply, so skipping Terraform execution." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -z "$TERRAFORM_OPERATION" ]; then
            echo "### Not running Terraform 🚀" >> "$GITHUB_STEP_SUMMARY"
            echo "Could not determine the Terraform operation to perform. Assuming there are no Terraform changes to apply, so skipping Terraform execution." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Running Terraform 🚀"
            echo "- Environment: **${TERRAFORM_ENV}**"
            echo "- Operation: **${TERRAFORM_OPERATION}**"
          } >> "$GITHUB_STEP_SUMMARY"
    outputs:
      environment_name: ${{ steps.basic_vars.outputs.environment_name }}
      terraform_root_path: ${{ steps.detect-path.outputs.terraform_root_path || inputs.terraform_root_path }}
      terraform_operation: ${{ steps.operation.outputs.terraform_operation }}

  terraform:
    name: terraform ${{ needs.compute_basic_vars.outputs.terraform_operation }} on ${{ needs.compute_basic_vars.outputs.environment_name }}
    runs-on: ubuntu-latest
    needs:
      - compute_basic_vars
    if: needs.compute_basic_vars.outputs.environment_name != '' && needs.compute_basic_vars.outputs.terraform_root_path != '' && needs.compute_basic_vars.outputs.terraform_operation != ''
    environment:
      name: ${{ needs.compute_basic_vars.outputs.environment_name }}
      # Tracking deployment only when running terraform apply or destroy.
      # https://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/control-deployments#using-environments-without-deployments
      deployment: ${{ needs.compute_basic_vars.outputs.terraform_operation != 'plan' }}
    concurrency:
      group: ${{ needs.compute_basic_vars.outputs.environment_name }}
      cancel-in-progress: false
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RANCHER2_ACCESS_KEY: ${{ secrets.RANCHER2_ACCESS_KEY }}
      RANCHER2_SECRET_KEY: ${{ secrets.RANCHER2_SECRET_KEY }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      CUSTOM_SECRET_0: ${{ secrets.CUSTOM_SECRET_0 }}
      CUSTOM_SECRET_1: ${{ secrets.CUSTOM_SECRET_1 }}
      CUSTOM_SECRET_2: ${{ secrets.CUSTOM_SECRET_2 }}
      CUSTOM_SECRET_3: ${{ secrets.CUSTOM_SECRET_3 }}
      CUSTOM_SECRET_4: ${{ secrets.CUSTOM_SECRET_4 }}
      CUSTOM_SECRET_5: ${{ secrets.CUSTOM_SECRET_5 }}
      CUSTOM_SECRET_6: ${{ secrets.CUSTOM_SECRET_6 }}
      CUSTOM_SECRET_7: ${{ secrets.CUSTOM_SECRET_7 }}
      CUSTOM_SECRET_8: ${{ secrets.CUSTOM_SECRET_8 }}
      CUSTOM_SECRET_9: ${{ secrets.CUSTOM_SECRET_9 }}
      RESOURCE_NAME: ${{ vars.RESOURCE_NAME }}
      TF_VAR_resource_name: ${{ vars.RESOURCE_NAME }}
      TERRAFORM_PRE_RUN: |
        set +x -euo pipefail
        if [ -n "$AZURE_CREDENTIALS" ]; then
          curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientId')
          CLIENT_SECRET=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientSecret')
          TENANT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.tenantId')
          SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.subscriptionId')
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" --tenant "$TENANT_ID" --output none
          if [ -n "$SUBSCRIPTION_ID" ] && [ "$SUBSCRIPTION_ID" != "null" ]; then
            az account set --subscription "$SUBSCRIPTION_ID"
          fi
        fi
        if [ -n "$AWS_ACCESS_KEY_ID" ] || [ -n "${{ vars.AWS_ROLE_ARN }}" ]; then
          if [ ! -x ./aws/install ]; then
            curl -sSf https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o awscliv2.zip
            unzip -q awscliv2.zip
          fi
          ./aws/install
        fi
        if [ "${{ inputs.install_kubectl }}" == "true" ]; then
          if [ -z "${{ inputs.kubectl_version }}" ]; then
            echo "⚙️ Will install latest stable kubectl..."
            KUBECTL_VERSION=$(curl -sSfL --max-time 10 --retry 3 https://dl.k8s.io/release/stable.txt)
            echo "✅ Latest stable kubectl version resolved to ${KUBECTL_VERSION}"
          else
            echo "⚙️ Will install kubectl version ${{ inputs.kubectl_version }}..."
            KUBECTL_VERSION="${{ inputs.kubectl_version }}"
          fi

          echo "📦 Downloading kubectl version ${KUBECTL_VERSION}..."
          curl -sSfL --max-time 30 --retry 3 -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -sSfL --max-time 10 --retry 3 -o kubectl.sha256 "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"

          echo "🔍 Verifying kubectl checksum..."
          if ! echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check --status; then
            echo "❌ Checksum verification failed for kubectl!"
            exit 1
          fi

          install -m 0755 kubectl /usr/local/bin/kubectl
          rm -f kubectl kubectl.sha256
          echo "✅ kubectl installed successfully:"
          kubectl version --client
        fi

      # https://github.com/dflook/terraform-github-actions/tree/main/terraform-apply#applying-a-plan-using-a-comment
      PR_CHECKOUT_REF: refs/pull/${{ github.event.issue.number }}/merge
    steps:
      - name: Check environment requirements
        env:
          ENVIRONMENT_NAME: ${{ needs.compute_basic_vars.outputs.environment_name }}
        run: |
          if [ -z "$ENVIRONMENT_NAME" ]; then
            echo "Environment name should have been determined at this point, but it's empty. BUG?"
            exit 1
          fi
          if [ -z "${{ vars.RESOURCE_NAME }}" ]; then
            echo "RESOURCE_NAME must be set in the vars context of $ENVIRONMENT_NAME to provide a unique identifier"
            exit 1
          fi
          if [ -z "${{ vars.TERRAFORM_STATE_BUCKET }}" ] && [ -z "${{ vars.TERRAFORM_STATE_STORAGE_ACCOUNT }}" ]; then
            echo "Either TERRAFORM_STATE_BUCKET (for AWS S3) or TERRAFORM_STATE_STORAGE_ACCOUNT (for Azure Storage) must be set in the vars context of $ENVIRONMENT_NAME to specify the backend used for terraform state storage"
            exit 1
          fi
          if [ -n "${{ vars.TERRAFORM_STATE_BUCKET }}" ] && [ -n "${{ vars.TERRAFORM_STATE_STORAGE_ACCOUNT }}" ]; then
            echo "TERRAFORM_STATE_BUCKET and TERRAFORM_STATE_STORAGE_ACCOUNT are mutually exclusive in the vars context of $ENVIRONMENT_NAME; configure exactly one terraform state backend"
            exit 1
          fi
          if [ -n "${{ vars.TERRAFORM_STATE_STORAGE_ACCOUNT }}" ]; then
            if [ -z "${{ vars.TERRAFORM_STATE_RESOURCE_GROUP }}" ]; then
              echo "TERRAFORM_STATE_RESOURCE_GROUP must be set in the vars context of $ENVIRONMENT_NAME when using Azure Storage backend"
              exit 1
            fi
            if [ -z "${{ vars.TERRAFORM_STATE_CONTAINER }}" ]; then
              echo "TERRAFORM_STATE_CONTAINER must be set in the vars context of $ENVIRONMENT_NAME when using Azure Storage backend"
              exit 1
            fi
            if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
              echo "AZURE_CREDENTIALS secret must be provided when using Azure Storage backend"
              exit 1
            fi
          fi
          if [ -n "${{ inputs.github_app_repo_owner }}" ]; then
            if [ -z "${{ inputs.github_app_token_client_id }}" ] || [ -z "${{ secrets.GITHUB_TOKEN_PRIVATE_KEY }}" ]; then
              echo "github_app_token_client_id input and GITHUB_TOKEN_PRIVATE_KEY secret must both be provided when github_app_repo_owner is set"
              exit 1
            fi
          fi

      - name: Build backend config
        id: backend-config
        env:
          TERRAFORM_ROOT_PATH: ${{ needs.compute_basic_vars.outputs.terraform_root_path }}
        run: |
          if [ -n "${{ vars.TERRAFORM_STATE_STORAGE_ACCOUNT }}" ]; then
            echo "Using Azure Storage backend: ${{ vars.TERRAFORM_STATE_STORAGE_ACCOUNT }}/${{ vars.TERRAFORM_STATE_CONTAINER }}"
            {
              echo "backend_config<<BACKEND"
              echo "resource_group_name=${{ vars.TERRAFORM_STATE_RESOURCE_GROUP }}"
              echo "storage_account_name=${{ vars.TERRAFORM_STATE_STORAGE_ACCOUNT }}"
              echo "container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}"
              echo "key=${{ vars.RESOURCE_NAME }}/${{ env.TERRAFORM_ROOT_PATH }}/terraform.tfstate"
              echo "use_cli=true"
              echo "BACKEND"
            } >> "$GITHUB_OUTPUT"
          else
            echo "Using AWS S3 backend: ${{ vars.TERRAFORM_STATE_BUCKET }}"
            {
              echo "backend_config<<BACKEND"
              echo "bucket=${{ vars.TERRAFORM_STATE_BUCKET }}"
              echo "key=${{ vars.RESOURCE_NAME }}/${{ env.TERRAFORM_ROOT_PATH }}/terraform.tfstate"
              echo "BACKEND"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'issue_comment' && env.PR_CHECKOUT_REF || '' }}

      - name: Install OIDC Client from Core Package
        if: ${{ inputs.create_oidc_token_file }}
        run: npm install @actions/core@1.11.0 @actions/http-client@2.2.3

      - name: Request token
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: ${{ inputs.create_oidc_token_file }}
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            let id_token = await coredemo.getIDToken("sts.amazonaws.com")
            coredemo.setOutput('id_token', id_token)

      - name: Save token to file
        if: ${{ inputs.create_oidc_token_file }}
        run: echo "${{ steps.idtoken.outputs.id_token }}" >> idtoken.json

      - name: Assume AWS Role when AWS_ROLE_ARN is set
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        if: vars.AWS_ROLE_ARN != ''
        with:
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: TerraformWorkflow

      - name: Load environment variables from yml
        uses: Alfresco/alfresco-build-tools/.github/actions/env-load-from-yaml@ea5ef8e5f1835df3f3cafebceed94f66dbdb86ee
        with:
          yml_path: ${{ needs.compute_basic_vars.outputs.terraform_root_path }}/tfenv.yml

      - name: Generate GitHub App token
        if: inputs.github_app_repo_owner != ''
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.github_app_token_client_id }}
          private-key: ${{ secrets.GITHUB_TOKEN_PRIVATE_KEY }}
          owner: ${{ inputs.github_app_repo_owner }}
          repositories: |
            terraform-alfresco-modules

      - name: Set TERRAFORM_HTTP_CREDENTIALS
        run: |
          if [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "TERRAFORM_HTTP_CREDENTIALS=github.com/${{ inputs.github_app_repo_owner }}=x-access-token:${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.BOT_GITHUB_TOKEN }}" ]; then
            echo "TERRAFORM_HTTP_CREDENTIALS=github.com/Alfresco=alfresco-build:${{ secrets.BOT_GITHUB_TOKEN }}" >> "$GITHUB_ENV"
          fi

      - name: Terraform validate
        if: needs.compute_basic_vars.outputs.terraform_operation == 'plan' && github.run_attempt == 1
        uses: dflook/terraform-validate@4cef5d8a4b92bcd88486e41e22a42942a382c9d6 # v2.2.3
        with:
