name: Reusable Release

on:
  workflow_call:
    inputs:
      release_type_override:
        description: "Override release type instead of using PR labels (patch, minor, major)"
        required: false
        type: string
      target_branch:
        description: "Branch to create the release from"
        required: false
        type: string
        default: ${{ github.event.repository.default_branch }}
      release_command:
        description: "Path to the release script to execute"
        required: false
        type: string
      commit_username:
        description: >-
          Git username exposed to the release command as the COMMIT_USERNAME env
          var. Kept for backward compatibility: the pushed commit author is now
          determined by the auth token, not this value
        required: false
        type: string
      commit_email:
        description: >-
          Git email exposed to the release command as the COMMIT_EMAIL env var.
          Kept for backward compatibility: the pushed commit author is now
          determined by the auth token, not this value
        required: false
        type: string
      github_app_client_id:
        description: >-
          GitHub App client id. When set, the workflow authenticates via a
          GitHub App installation token (with the GH_APP_PRIVATE_KEY secret)
          instead of BOT_GITHUB_TOKEN
        required: false
        type: string
      node_version:
        description: >-
          Node.js version to set up before running the release command. When
          set, the setup-node action is run; otherwise it is skipped.
        required: false
        type: string
      github_app_workflows_permission:
        description: >-
          Request the workflows:write permission on the GitHub App token.
          Required when the release commit modifies files under
          .github/workflows/, otherwise the GitHub API rejects the commit.
        required: false
        type: boolean
        default: false
    secrets:
      BOT_GITHUB_TOKEN:
        description: >-
          GitHub token with permissions to create release and push commits.
          Required unless github_app_client_id is set.
        required: false
      GH_APP_PRIVATE_KEY:
        description: "GitHub App private key (used when github_app_client_id is set)"
        required: false

concurrency:
  group: release-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        steps:
          - name: Create GitHub App token
            id: app-token
            if: inputs.github_app_client_id != ''
            uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
            with:
              client-id: ${{ inputs.github_app_client_id }}
              private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
              permission-contents: write
              permission-workflows: ${{ inputs.github_app_workflows_permission && 'write' || '' }}

          - name: Validate authentication is configured
            env:
              EFFECTIVE_TOKEN: ${{ steps.app-token.outputs.token || secrets.BOT_GITHUB_TOKEN }}
            run: |
              if [ -z "$EFFECTIVE_TOKEN" ]; then
                echo "::error::No authentication configured: set the github_app_client_id input (with the GH_APP_PRIVATE_KEY secret) or provide the BOT_GITHUB_TOKEN secret."
                exit 1
              fi

          - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            with:
              fetch-depth: 0
              ref: ${{ inputs.target_branch }}
              token: ${{ steps.app-token.outputs.token || secrets.BOT_GITHUB_TOKEN }}

          - name: Setup Node.js
            if: inputs.node_version != ''
            uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
            with:
              node-version: ${{ inputs.node_version }}

          - name: Get release type from PR label or input
            id: set-release-level
            env:
              PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
              RELEASE_TYPE_INPUT: ${{ inputs.release_type_override }}
            run: |
              RELEASE_LEVEL=""

              # Check PR labels if this is a pull request event
              if [[ "$GITHUB_EVENT_NAME" == "pull_request" && -n "$PR_LABELS" ]]; then
                if echo "$PR_LABELS" | grep -q "release/major"; then
                  RELEASE_LEVEL="major"
                elif echo "$PR_LABELS" | grep -q "release/minor"; then
                  RELEASE_LEVEL="minor"
                elif echo "$PR_LABELS" | grep -q "release/patch"; then
                  RELEASE_LEVEL="patch"
                else
                  echo "::info::No release label found on PR, not creating a release."
                fi
              fi

              # Fall back to input if no label was found
              if [[ -z "$RELEASE_LEVEL" && -n "$RELEASE_TYPE_INPUT" ]]; then
                if [[ "$RELEASE_TYPE_INPUT" =~ ^(major|minor|patch)$ ]]; then
                  RELEASE_LEVEL="$RELEASE_TYPE_INPUT"
                else
                  echo "::error::Invalid release_type_override: '$RELEASE_TYPE_INPUT'. Must be 'major', 'minor', or 'patch'."
                  exit 1
                fi
              fi

              echo "release-level=$RELEASE_LEVEL" >> "$GITHUB_OUTPUT"

          - name: Get latest tag and bump version
            id: bump-semver
            if: steps.set-release-level.outputs.release-level != ''
            run: |
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
              if [[ "$LATEST_TAG" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)(-.+)?$ ]]; then
                MAJOR="${BASH_REMATCH[1]}"
                MINOR="${BASH_REMATCH[2]}"
                PATCH="${BASH_REMATCH[3]}"
              else
                MAJOR=0
                MINOR=0
                PATCH=0
              fi

              # Bump version based on release level
              case "${{ steps.set-release-level.outputs.release-level }}" in
                major)
                  MAJOR=$((MAJOR + 1))
                  MINOR=0
                  PATCH=0
                  ;;
                minor)
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  ;;
                patch)
                  PATCH=$((PATCH + 1))
                  ;;
              esac

              NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
              echo "::info::Bumping version from $LATEST_TAG to $NEW_VERSION"
              echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "current-version=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          - name: Run optional release command
            if: steps.set-release-level.outputs.release-level != '' && inputs.release_command != ''
            env:
              RELEASE_VERSION: ${{ steps.bump-semver.outputs.new-version }}
              CURRENT_VERSION: ${{ steps.bump-semver.outputs.current-version }}
              COMMIT_USERNAME: ${{ inputs.commit_username }}
              COMMIT_EMAIL: ${{ inputs.commit_email }}
              GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.BOT_GITHUB_TOKEN }}
              TARGET_BRANCH: ${{ inputs.target_branch }}
            run: |
              ${{ inputs.release_command }}

          - name: Commit back changes from release script
            uses: iarekylew00t/verified-bot-commit@5b4e8852dc472093935b8debcb81459bb79f7986 # v2.3.2
            if: steps.set-release-level.outputs.release-level != '' && inputs.release_command != ''
            with:
              ref: ${{ inputs.target_branch }}
              message: Release ${{ steps.bump-semver.outputs.new-version }}
              files: |
                **
              if-no-commit: info
              token: ${{ steps.app-token.outputs.token || secrets.BOT_GITHUB_TOKEN }}

          - name: Generate release notes and git tag
            if: steps.set-release-level.outputs.release-level != '' && false
            env:
              GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.BOT_GITHUB_TOKEN }}
            run: gh release create "${{ steps.bump-semver.outputs.new-version }}" --generate-notes -t "${{ steps.bump-semver.outputs.new-version }}"
