name: Automated Branch Promotion PRs

on:
  workflow_call:
    inputs:
      source-branch:
        description: 'Source branch to promote from'
        type: string
        default: 'develop'
      target-branches:
        description: 'JSON array of target branches to promote to'
        type: string
        required: true
      pr-title-template:
        description: 'Template for PR title (use {0} placeholder for branch)'
        type: string
        default: 'Update {0} env'
      pr-body-template:
        description: 'Template for PR body (use {0} for branch and {1} for source placeholders)'
        type: string
        default: 'This PR updates the {0} environment with the latest changes from the {1} branch.'
      draft-pr:
        description: 'Create PRs as drafts'
        type: boolean
        default: true
      reviewers:
        description: 'A comma or newline-separated list of reviewers (GitHub usernames) to request'
        type: string
        required: false
      team-reviewers:
        description: 'A comma or newline-separated list of GitHub teams to request as reviewers'
        type: string
        required: false
      github-app-client-id:
        description: 'GitHub App client ID (or App ID) used to mint a short-lived token for creating PRs. Provide together with the github-app-private-key secret to use GitHub App authentication instead of gh-token.'
        type: string
        required: false
    secrets:
      gh-token:
        description: 'GitHub token (PAT) for creating PRs. Used as a fallback when GitHub App authentication is not configured. Deprecated: prefer github-app-client-id + github-app-private-key.'
        required: false
      github-app-private-key:
        description: 'GitHub App private key (PEM) used to mint a short-lived token for creating PRs. Provide together with the github-app-client-id input.'
        required: false

permissions:
  contents: read

jobs:
  promotion:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(inputs.target-branches) }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: inputs.github-app-client-id != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.github-app-client-id }}
          private-key: ${{ secrets.github-app-private-key }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ matrix.branch }}
          token: ${{ steps.app-token.outputs.token || secrets.gh-token }}

      - name: Reset promotion branch
        run: |
          git fetch origin ${{ inputs.source-branch }}
          git reset --hard origin/${{ inputs.source-branch }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: ${{ inputs.source-branch }}
          title: ${{ format(inputs.pr-title-template, matrix.branch) }}
          draft: ${{ inputs.draft-pr }}
          body: ${{ format(inputs.pr-body-template, matrix.branch, inputs.source-branch) }}
          reviewers: ${{ inputs.reviewers }}
          team-reviewers: ${{ inputs.team-reviewers }}
          token: ${{ steps.app-token.outputs.token || secrets.gh-token }}
