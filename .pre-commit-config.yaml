repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '.updatecli/templates'
      - id: check-json
      - id: check-xml
      - id: check-merge-conflict
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: end-of-file-fixer
        exclude: '(.*/dist/.*|\.github/workflows/.*\.lock\.yml$)'
      - id: trailing-whitespace
        exclude: '(.*/dist/.*|\.github/workflows/.*\.lock\.yml$)'

  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-dependabot
      - id: check-github-actions
      - id: check-github-workflows
        exclude: ^\.github/workflows/.*\.lock\.yml$

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
    - id: markdownlint
      exclude: ^(\.github/workflows/.*\.lock\.yml|CLAUDE\.md)$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        exclude: ^(\.github/tests/|\.github/workflows/.*\.lock\.yml$)

  - repo: https://github.com/hyland/github-actions-ensure-sha-pinned-actions
    rev: v1.2.0
    hooks:
      - id: gha-sha-convert
        args: [--allowlist, 'Alfresco/alfresco-build-tools/*']
        exclude: ^\.github/tests/

  - repo: local
    hooks:
      - id: compile-agentic-workflows
        name: Validate GitHub Agentic Workflow compilation
        language: system
        entry: .github/scripts/compile_agentic_workflows.sh
        pass_filenames: false
        files: ^\.github/workflows/.*\.md$
        stages: [pre-commit]

      - id: check-action-nesting-depth
        name: Check GitHub Actions nesting depth
        language: python
        entry: python .github/scripts/check_action_nesting.py
        args: [--max-depth, '3']
        pass_filenames: false
        files: ^\.github/(actions|workflows)/.*\.ya?ml$
        additional_dependencies: [pyyaml]

      - id: check-readme-missing-entries
        name: Check README entries for GitHub Actions missing entries
        language: system
        entry: .github/scripts/check_readme.sh
        args: [--exclude-path, .github/actions/dbp-charts]
        pass_filenames: false

  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-pyproject
          - flake8-quotes

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [ "--severity=style" ]
        files: ^\.github/scripts/.*\.sh$

  - repo: https://github.com/thlorenz/doctoc
    rev: v2.3.0
    hooks:
      - id: doctoc
        args: [--maxlevel, '3', --github, --notitle]
        files: ^docs/README\.md$
